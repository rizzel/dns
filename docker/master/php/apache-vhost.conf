<VirtualHost *:80>
    DocumentRoot "/var/www/html/htdocs"

    RewriteEngine on
    RewriteRule ^/u/?$ /u.php
    RewriteRule ^/(ip4|ip6|ip|myip|inadyn4|inadyn6)\b(.*)$ /rpc.php/$1$2 [QSA]

    <Directory "/var/www/html/htdocs">
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    AddType application/x-x509-ca-cert .crt .der
</VirtualHost>